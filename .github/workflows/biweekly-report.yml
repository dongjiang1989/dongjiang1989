name: Biweekly GitHub Activity Report

on:
  schedule:
    # Run every Monday at 00:00 UTC; workflow logic determines biweekly cadence
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Report start date (YYYY-MM-DD). Leave empty for auto-calculation.'
        required: false
        type: string
        default: ''
      end_date:
        description: 'Report end date (YYYY-MM-DD). Leave empty for auto-calculation.'
        required: false
        type: string
        default: ''
      mode:
        description: 'Report generation mode'
        required: true
        type: choice
        default: 'latest'
        options:
          - latest     # Only the current biweekly period
          - all        # All periods from 2025-01-01 to today
          - custom     # Use start_date and end_date

jobs:
  generate-report:
    name: Generate Biweekly Report
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Determine report parameters
        id: params
        run: |
          MODE="${{ inputs.mode || 'latest' }}"
          START="${{ inputs.start_date }}"
          END="${{ inputs.end_date }}"

          echo "mode=$MODE" >> $GITHUB_OUTPUT

          if [ "$MODE" = "custom" ] && [ -n "$START" ] && [ -n "$END" ]; then
            echo "args=--start $START --end $END" >> $GITHUB_OUTPUT
          elif [ "$MODE" = "all" ]; then
            echo "args=--all" >> $GITHUB_OUTPUT
          else
            echo "args=--latest" >> $GITHUB_OUTPUT
          fi

      - name: Generate report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Running report generation with mode: ${{ steps.params.outputs.mode }}"
          python3 scripts/generate_biweekly_report.py ${{ steps.params.args }}

      - name: Commit and push reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add report/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update biweekly activity reports

            Generated by GitHub Actions at $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
